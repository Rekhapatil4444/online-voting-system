<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VoteSecure — Candidates</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root{--bg:#080c14;--surface:#0f1623;--surface2:#161e2e;--border:rgba(99,179,237,0.10);--accent:#38bdf8;--accent2:#6366f1;--text:#e2e8f0;--muted:#64748b;--success:#10b981;--danger:#f43f5e;--warning:#f59e0b;--sidebar-w:240px;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;}
    .sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100;}
    .sidebar-brand{padding:24px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
    .sidebar-brand .icon{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
    .sidebar-brand h2{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;background:linear-gradient(135deg,#e2e8f0,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2;}
    .sidebar-brand small{color:var(--muted);font-size:10px;letter-spacing:1px;text-transform:uppercase;display:block;}
    .sidebar-nav{flex:1;padding:16px 12px;}
    .nav-section-label{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);padding:8px 10px 6px;font-weight:600;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;color:var(--muted);text-decoration:none;font-size:14px;font-weight:500;margin-bottom:2px;transition:all 0.2s;border:1px solid transparent;}
    .nav-item:hover,.nav-item.active{background:var(--surface2);color:var(--text);border-color:var(--border);}
    .nav-item.active{color:var(--accent);}
    .nav-item i{width:18px;text-align:center;font-size:13px;}
    .sidebar-footer{padding:16px 12px;border-top:1px solid var(--border);}
    .admin-profile{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border-radius:10px;border:1px solid var(--border);}
    .avatar{width:32px;height:32px;background:linear-gradient(135deg,var(--accent2),var(--danger));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;font-family:'Syne',sans-serif;}
    .admin-info strong{font-size:13px;font-weight:600;display:block;}
    .admin-info span{font-size:11px;color:var(--muted);}
    .main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;}
    .topbar{padding:16px 28px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
    .topbar h1{font-family:'Syne',sans-serif;font-weight:700;font-size:20px;}
    .page-content{padding:28px;flex:1;}
    .btn-add{display:flex;align-items:center;gap:8px;padding:9px 18px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;color:white;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 16px rgba(56,189,248,0.25);}
    .btn-add:hover{transform:translateY(-2px);}
    .data-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
    .data-card-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .data-card-title{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;}
    table{width:100%;border-collapse:collapse;}
    thead th{padding:12px 20px;text-align:left;font-size:11px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface2);}
    tbody tr{border-bottom:1px solid rgba(99,179,237,0.05);transition:background 0.15s;}
    tbody tr:hover{background:var(--surface2);}
    tbody td{padding:14px 20px;font-size:14px;}
    .candidate-name{font-weight:600;}
    .party-tag{background:rgba(99,102,241,0.1);color:#a5b4fc;border-radius:6px;padding:3px 10px;font-size:12px;font-weight:600;}
    .pos-tag{background:rgba(56,189,248,0.08);color:var(--accent);border-radius:6px;padding:3px 10px;font-size:12px;}
    .votes-pill{background:rgba(16,185,129,0.1);color:var(--success);border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700;}
    /* Modal */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(8,12,20,0.85);backdrop-filter:blur(6px);z-index:200;align-items:center;justify-content:center;}
    .modal-overlay.open{display:flex;}
    .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:440px;animation:fadeUp 0.3s ease;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .modal-title{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;margin-bottom:22px;}
    .form-group{margin-bottom:16px;}
    label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;}
    input,select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:all 0.2s;}
    input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(56,189,248,0.1);}
    input::placeholder{color:var(--muted);}
    select option{background:var(--surface2);}
    .modal-footer{display:flex;gap:10px;margin-top:22px;}
    .btn-save{flex:1;padding:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;color:white;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;cursor:pointer;}
    .btn-cancel{padding:12px 18px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;}
    .msg{padding:10px 14px;border-radius:10px;font-size:13px;margin-top:12px;}
    .msg.error{background:rgba(244,63,94,0.1);color:var(--danger);}
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-brand">
      <div class="icon">🗳</div>
      <div><h2>VoteSecure</h2><small>Admin Panel</small></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
      <a href="voters.html" class="nav-item"><i class="fas fa-users"></i> Voters</a>
      <div class="nav-section-label">Election</div>
      <a href="positions.html" class="nav-item"><i class="fas fa-briefcase"></i> Positions</a>
      <a href="candidates.html" class="nav-item active"><i class="fas fa-user-tie"></i> Candidates</a>
      <a href="votes.html" class="nav-item"><i class="fas fa-vote-yea"></i> Votes & Results</a>
      <a href="election-title.html" class="nav-item"><i class="fas fa-clipboard-list"></i> Elections</a>
    </nav>
    <div class="sidebar-footer">
      <div class="admin-profile">
        <div class="avatar">A</div>
        <div class="admin-info"><strong>Administrator</strong><span>Super Admin</span></div>
        <a href="login.html" style="color:var(--muted);font-size:14px;"><i class="fas fa-sign-out-alt"></i></a>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <h1>Candidates</h1>
      <button class="btn-add" onclick="openModal()"><i class="fas fa-plus"></i> Add Candidate</button>
    </div>
    <div class="page-content">
      <div class="data-card">
        <div class="data-card-header">
          <span class="data-card-title">All Candidates</span>
        </div>
        <table>
          <thead>
            <tr><th>ID</th><th>Candidate</th><th>Party</th><th>Position</th><th>Votes</th></tr>
          </thead>
          <tbody id="candidateTableBody">
            <tr><td colspan="5" style="text-align:center;padding:40px;color:var(--muted);">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal-box">
      <div class="modal-title">🧑‍💼 Add Candidate</div>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="cName" placeholder="Candidate full name">
      </div>
      <div class="form-group">
        <label>Party / Affiliation</label>
        <input type="text" id="cParty" placeholder="e.g. Independent, Democratic">
      </div>
      <div class="form-group">
        <label>Running For Position</label>
        <select id="cPosition"><option value="">Select Position…</option></select>
      </div>
      <div id="modalMsg"></div>
      <div class="modal-footer">
        <button class="btn-save" onclick="submitCandidate()">Add Candidate</button>
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    function openModal() { loadPositions(); document.getElementById('modal').classList.add('open'); }
    function closeModal() { document.getElementById('modal').classList.remove('open'); }

    async function loadCandidates() {
      const res = await fetch('http://localhost:5000/api/candidates');
      const data = await res.json();
      const tbody = document.getElementById('candidateTableBody');
      if (!data.length) { tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--muted);">No candidates yet</td></tr>'; return; }
      tbody.innerHTML = data.map(c => `
        <tr>
          <td style="color:var(--muted);font-size:12px;">#${c.id}</td>
          <td class="candidate-name">${c.name}</td>
          <td><span class="party-tag">${c.party}</span></td>
          <td><span class="pos-tag">${c.position_name || '—'}</span></td>
          <td><span class="votes-pill">▲ ${c.votes_count}</span></td>
        </tr>`).join('');
    }

    async function loadPositions() {
      const res = await fetch('http://localhost:5000/api/positions');
      const data = await res.json();
      const sel = document.getElementById('cPosition');
      sel.innerHTML = '<option value="">Select Position…</option>';
      data.forEach(p => sel.innerHTML += `<option value="${p.id}">${p.position_name}</option>`);
    }

    async function submitCandidate() {
      const name = document.getElementById('cName').value.trim();
      const party = document.getElementById('cParty').value.trim();
      const position_id = document.getElementById('cPosition').value;
      const msg = document.getElementById('modalMsg');
      if (!name || !party || !position_id) { msg.innerHTML = '<div class="msg error">All fields are required.</div>'; return; }
      try {
        const res = await fetch('http://localhost:5000/api/candidates', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, party, position_id })
        });
        const data = await res.json();
        if (!res.ok) { msg.innerHTML = `<div class="msg error">${data.error}</div>`; return; }
        closeModal();
        document.getElementById('cName').value = '';
        document.getElementById('cParty').value = '';
        loadCandidates();
      } catch(e) { msg.innerHTML = '<div class="msg error">Network error.</div>'; }
    }

    loadCandidates();
  </script>
</body>
</html>
