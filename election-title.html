<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VoteSecure — Elections</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root{--bg:#080c14;--surface:#0f1623;--surface2:#161e2e;--border:rgba(99,179,237,0.10);--accent:#38bdf8;--accent2:#6366f1;--text:#e2e8f0;--muted:#64748b;--success:#10b981;--danger:#f43f5e;--warning:#f59e0b;--sidebar-w:240px;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;}
    .sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100;}
    .sidebar-brand{padding:24px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
    .sidebar-brand .icon{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
    .sidebar-brand h2{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;background:linear-gradient(135deg,#e2e8f0,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2;}
    .sidebar-brand small{color:var(--muted);font-size:10px;letter-spacing:1px;text-transform:uppercase;display:block;}
    .sidebar-nav{flex:1;padding:16px 12px;}
    .nav-section-label{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);padding:8px 10px 6px;font-weight:600;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;color:var(--muted);text-decoration:none;font-size:14px;font-weight:500;margin-bottom:2px;transition:all 0.2s;border:1px solid transparent;}
    .nav-item:hover,.nav-item.active{background:var(--surface2);color:var(--text);border-color:var(--border);}
    .nav-item.active{color:var(--accent);}
    .nav-item i{width:18px;text-align:center;font-size:13px;}
    .sidebar-footer{padding:16px 12px;border-top:1px solid var(--border);}
    .admin-profile{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border-radius:10px;border:1px solid var(--border);}
    .avatar{width:32px;height:32px;background:linear-gradient(135deg,var(--accent2),var(--danger));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;font-family:'Syne',sans-serif;}
    .admin-info strong{font-size:13px;font-weight:600;display:block;}
    .admin-info span{font-size:11px;color:var(--muted);}
    .main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;}
    .topbar{padding:16px 28px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
    .topbar h1{font-family:'Syne',sans-serif;font-weight:700;font-size:20px;}
    .page-content{padding:28px;flex:1;}
    /* Add form card */
    .add-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:24px;}
    .add-card h3{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;margin-bottom:18px;}
    .form-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:12px;align-items:end;}
    .form-group{display:flex;flex-direction:column;gap:6px;}
    label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;}
    input{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:all 0.2s;}
    input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(56,189,248,0.1);}
    input::placeholder{color:var(--muted);}
    input[type="date"]{color-scheme:dark;}
    .btn-add{padding:10px 18px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;color:white;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.2s;white-space:nowrap;height:42px;}
    .btn-add:hover{transform:translateY(-2px);}
    .data-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
    .data-card-header{padding:18px 22px;border-bottom:1px solid var(--border);}
    .data-card-title{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;}
    table{width:100%;border-collapse:collapse;}
    thead th{padding:12px 20px;text-align:left;font-size:11px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface2);}
    tbody tr{border-bottom:1px solid rgba(99,179,237,0.05);transition:background 0.15s;}
    tbody tr:hover{background:var(--surface2);}
    tbody td{padding:14px 20px;font-size:14px;}
    .election-title{font-weight:700;color:var(--text);}
    .date-range{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}
    .date-sep{color:var(--border);}
    .status-active{background:rgba(16,185,129,0.1);color:var(--success);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;}
    .status-upcoming{background:rgba(245,158,11,0.1);color:var(--warning);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;}
    .status-ended{background:rgba(100,116,139,0.15);color:var(--muted);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;}
    .msg{padding:10px 14px;border-radius:10px;font-size:13px;margin-top:12px;}
    .msg.success{background:rgba(16,185,129,0.1);color:var(--success);}
    .msg.error{background:rgba(244,63,94,0.1);color:var(--danger);}
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-brand">
      <div class="icon">🗳</div>
      <div><h2>VoteSecure</h2><small>Admin Panel</small></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
      <a href="voters.html" class="nav-item"><i class="fas fa-users"></i> Voters</a>
      <div class="nav-section-label">Election</div>
      <a href="positions.html" class="nav-item"><i class="fas fa-briefcase"></i> Positions</a>
      <a href="candidates.html" class="nav-item"><i class="fas fa-user-tie"></i> Candidates</a>
      <a href="votes.html" class="nav-item"><i class="fas fa-vote-yea"></i> Votes & Results</a>
      <a href="election-title.html" class="nav-item active"><i class="fas fa-clipboard-list"></i> Elections</a>
    </nav>
    <div class="sidebar-footer">
      <div class="admin-profile">
        <div class="avatar">A</div>
        <div class="admin-info"><strong>Administrator</strong><span>Super Admin</span></div>
        <a href="login.html" style="color:var(--muted);font-size:14px;"><i class="fas fa-sign-out-alt"></i></a>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="topbar"><h1>Elections</h1></div>
    <div class="page-content">
      <div class="add-card">
        <h3>📋 Create New Election</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Election Title</label>
            <input type="text" id="title" placeholder="e.g. Student Council 2025">
          </div>
          <div class="form-group">
            <label>Description</label>
            <input type="text" id="description" placeholder="Optional notes">
          </div>
          <div class="form-group">
            <label>Start Date</label>
            <input type="date" id="start_date">
          </div>
          <div class="form-group">
            <label>End Date</label>
            <input type="date" id="end_date">
          </div>
          <button class="btn-add" onclick="addElection()">+ Add</button>
        </div>
        <div id="formMsg"></div>
      </div>

      <div class="data-card">
        <div class="data-card-header"><div class="data-card-title">All Elections</div></div>
        <table>
          <thead>
            <tr><th>ID</th><th>Title</th><th>Description</th><th>Date Range</th><th>Status</th><th>Created</th></tr>
          </thead>
          <tbody id="electionTableBody">
            <tr><td colspan="6" style="text-align:center;padding:40px;color:var(--muted);">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    function getStatus(start, end) {
      const now = new Date(); const s = new Date(start); const e = new Date(end);
      if (now < s) return '<span class="status-upcoming">Upcoming</span>';
      if (now > e) return '<span class="status-ended">Ended</span>';
      return '<span class="status-active">● Active</span>';
    }

    async function loadElections() {
      try {
        const res = await fetch("http://localhost:5000/api/elections");
        const elections = await res.json();
        const tbody = document.getElementById("electionTableBody");
        tbody.innerHTML = elections.length
          ? elections.map(e => `
            <tr>
              <td style="color:var(--muted);font-size:12px;">#${e.id}</td>
              <td class="election-title">${e.title}</td>
              <td style="color:var(--muted);">${e.description || '—'}</td>
              <td><div class="date-range">${e.start_date || '—'}<span class="date-sep">→</span>${e.end_date || '—'}</div></td>
              <td>${getStatus(e.start_date, e.end_date)}</td>
              <td style="color:var(--muted);font-size:12px;">${new Date(e.created_at).toLocaleDateString()}</td>
            </tr>`).join("")
          : '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--muted);">No elections yet</td></tr>';
      } catch (err) {
        document.getElementById("electionTableBody").innerHTML = `<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--danger);">Error: ${err.message}</td></tr>`;
      }
    }

    async function addElection() {
      const title = document.getElementById("title").value.trim();
      const description = document.getElementById("description").value.trim();
      const start_date = document.getElementById("start_date").value;
      const end_date = document.getElementById("end_date").value;
      const msg = document.getElementById("formMsg");
      if (!title || !start_date || !end_date) { msg.innerHTML = '<div class="msg error">Title and both dates are required.</div>'; return; }
      try {
        const res = await fetch("http://localhost:5000/api/elections", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title, description, start_date, end_date })
        });
        if (res.ok) {
          msg.innerHTML = '<div class="msg success">✅ Election created successfully!</div>';
          document.getElementById("title").value = '';
          document.getElementById("description").value = '';
          document.getElementById("start_date").value = '';
          document.getElementById("end_date").value = '';
          setTimeout(() => msg.innerHTML = '', 3000);
          loadElections();
        } else {
          const data = await res.json();
          msg.innerHTML = `<div class="msg error">${data.error || 'Failed.'}</div>`;
        }
      } catch (err) { msg.innerHTML = `<div class="msg error">Network error.</div>`; }
    }
    loadElections();
  </script>
</body>
</html>
